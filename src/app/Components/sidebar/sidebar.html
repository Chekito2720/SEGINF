<aside class="sidebar" [class.collapsed]="collapsed()">

    <!-- Header -->
    <div class="sidebar-header">
        @if (!collapsed()) {
        <div class="brand">
            <i class="pi pi-shield"></i>
            <span class="brand-name">Mi App</span>
        </div>
        }
        <p-button [icon]="collapsed() ? 'pi pi-chevron-right' : 'pi pi-chevron-left'" [rounded]="true" [text]="true"
            severity="secondary" (onClick)="toggle()" [pTooltip]="collapsed() ? 'Expandir' : 'Colapsar'"
            tooltipPosition="right" />
    </div>

    <p-divider styleClass="sidebar-divider" />

    <!-- Nav -->
    <nav class="sidebar-nav">
        @for (item of navItems; track item.route) {
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-item"
            [pTooltip]="collapsed() ? item.label : ''" tooltipPosition="right">
            <i class="pi" [ngClass]="item.icon"></i>
            @if (!collapsed()) {
            <span>{{ item.label }}</span>
            }
        </a>
        }
    </nav>

    <div class="sidebar-spacer"></div>

    <p-divider styleClass="sidebar-divider" />

    <!-- Footer -->
    <div class="sidebar-footer">
        <a routerLink="/auth/login" class="nav-item logout" [pTooltip]="collapsed() ? 'Cerrar sesión' : ''"
            tooltipPosition="right">
            <i class="pi pi-sign-out"></i>
            @if (!collapsed()) {
            <span>Cerrar sesión</span>
            }
        </a>
    </div>

</aside>
